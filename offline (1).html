<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بدون اتصال</title>
  <style>
    body{margin:0;font-family:Tajawal,Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{max-width:560px;background:#fff;border-radius:20px;padding:28px;box-shadow:0 10px 30px rgba(15,23,42,.08);text-align:center}
    h1{margin:0 0 12px;font-size:28px}
    p{margin:0 0 8px;line-height:1.8}
  </style>
</head>
<body>
  <div class="card">
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>التطبيق ما زال يشتغل بالملفات المخزنة محليًا.</p>
    <p>بمجرد عودة الاتصال، أعد تحميل الصفحة لتحديث النسخة.</p>
  </div>
</body>
</html>
